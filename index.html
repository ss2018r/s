<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Silent Echoes: The Global History of Deaf Education. An interactive, accessible learning platform.">
    <title>Silent Echoes | Deaf Education History</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <style>
        /* === CSS Variables for Futuristic Theme === */
        :root {
            --space-bg: #0b0f19;
            --glass-bg: rgba(25, 30, 50, 0.4);
            --glass-border: rgba(255, 255, 255, 0.1);
            --neon-teal: #00f0ff;
            --text-main: #e2e8f0;
            --text-muted: #94a3b8;
        }

        /* === Base Reset & Accessibility === */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at center, #1a2035 0%, var(--space-bg) 100%);
            color: var(--text-main);
            overflow: hidden; /* Prevents scrollbars from 3D canvas */
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Skip to main content link for screen readers */
        .skip-link {
            position: absolute;
            top: -40px;
            left: 0;
            background: var(--neon-teal);
            color: #000;
            padding: 8px;
            z-index: 100;
            transition: top 0.2s;
        }
        .skip-link:focus { top: 0; }

        /* === Typography === */
        h1, h2, h3 { font-family: 'Space Grotesk', sans-serif; }
        
        /* === UI Layout === */
        header {
            position: relative;
            z-index: 10;
            padding: 1.5rem 3rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--glass-border);
            background: rgba(11, 15, 25, 0.5);
            backdrop-filter: blur(10px);
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: 2px;
            color: var(--text-main);
            text-transform: uppercase;
        }

        .logo span { color: var(--neon-teal); }

        /* Navigation Bar controls */
        .a11y-controls button {
            background: transparent;
            border: 1px solid var(--glass-border);
            color: var(--text-main);
            padding: 0.5rem 1rem;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .a11y-controls button:hover {
            border-color: var(--neon-teal);
            color: var(--neon-teal);
        }

        /* Main Container for 3D and UI */
        main {
            display: flex;
            flex: 1;
            position: relative;
        }

        /* 3D Canvas Container */
        #canvas-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* === Glassmorphism UI Panels === */
        .ui-layer {
            position: relative;
            z-index: 10;
            display: flex;
            width: 100%;
            padding: 2rem 3rem;
            pointer-events: none; /* Lets clicks pass through to the 3D globe */
        }

        .glass-panel {
            pointer-events: auto; /* Re-enables clicks for the panel */
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 2rem;
